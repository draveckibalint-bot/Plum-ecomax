<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plum ecoMAX 360 - Expert Mix Full Settings</title>
<style>
/* ===== SCREEN STYLES ===== */
:root {
    --bg: #000c1a; --text-en: #00e5ff; --text-hu: #ffff00;
    --border: #003d4d; --btn-bg: #1a1a1a; --selected-bg: #ffffff;
}
body { font-family: 'Courier New', monospace; background: #222; color: var(--text-en); margin:0; padding:10px; display:flex; flex-direction:column; align-items:center;}
.device { width:95%; max-width:400px; background:#333; padding:15px; border-radius:20px; border:4px solid #555; box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.screen { background: var(--bg); min-height:540px; border:2px solid #000; border-radius:5px; display:flex; flex-direction:column; position:relative; overflow:hidden;}
.header { background: var(--border); color:#fff; padding:12px; text-align:center; font-size:1.1em; font-weight:bold; border-bottom:2px solid #000; text-transform:uppercase;}
.menu-list { flex-grow:1; overflow-y:auto;}
.menu-item { padding:10px 15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
.menu-item:hover { background: var(--selected-bg); color:#000 !important;}
.menu-item:hover span { color:#000 !important;}
.labels { display:flex; flex-direction:column; flex-grow:1;}
.en { font-size:0.95em; font-weight:bold; color:var(--text-en);}
.hu { font-size:0.75em; font-weight:bold; color:var(--text-hu); text-transform:uppercase;}
.val { font-size:1.0em; font-weight:bold; color:#fff; margin-left:10px; text-align:right;}
.nav { display:flex; gap:5px; margin-bottom:10px; width:95%; max-width:400px; flex-wrap:wrap;}
.nav-btn { flex:1; padding:12px; background:var(--btn-bg); color:#fff; border:1px solid #666; border-radius:5px; cursor:pointer; font-weight:bold; font-size:0.85em; min-width:70px;}
.nav-btn:hover { background:#444; }
.nav-btn.pdf-btn { background:#1a4a1a; border-color:#00aa44; color:#00ff66;}
.nav-btn.pdf-btn:hover { background:#2a6a2a; }
.login-box { padding:15px; text-align:center; margin-top:20px; border:1px solid var(--border); border-radius:10px; background: rgba(0,61,77,0.2);}
.login-box input { width:60%; padding:8px; margin:10px 0; background:#000; color:var(--text-hu); border:1px solid var(--text-en); text-align:center; font-size:1.2em;}

/* ===== PRINT / PDF STYLES ===== */
#printArea { display:none; }

@media print {
    body { background: #fff !important; color: #000 !important; font-family: Arial, sans-serif; margin:0; padding:0; display:block; align-items:unset;}
    .device, .nav, #content-wrapper { display:none !important; }
    #printArea { display:block !important; }
    
    .pdf-page {
        width: 210mm;
        min-height: 297mm;
        padding: 15mm 15mm 15mm 15mm;
        box-sizing: border-box;
        page-break-after: always;
        background: #fff;
    }
    .pdf-page:last-child { page-break-after: avoid; }
    
    .pdf-header {
        border-bottom: 3px solid #003d4d;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }
    .pdf-header h1 {
        font-size: 18pt;
        margin: 0 0 4px 0;
        color: #000;
        font-family: Arial, sans-serif;
    }
    .pdf-header .subtitle {
        font-size: 10pt;
        color: #555;
        font-family: Arial, sans-serif;
    }
    .pdf-header .pellet-badge {
        display: inline-block;
        background: #003d4d;
        color: #fff;
        padding: 4px 14px;
        border-radius: 12px;
        font-size: 11pt;
        font-weight: bold;
        float: right;
        font-family: Arial, sans-serif;
    }
    .pdf-meta {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        font-size: 9pt;
        color: #444;
        font-family: Arial, sans-serif;
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 4px;
        background: #f9f9f9;
    }
    .pdf-meta span { flex:1; }
    
    .pdf-section {
        margin-bottom: 12px;
        break-inside: avoid;
    }
    .pdf-section-title {
        background: #003d4d;
        color: #fff;
        padding: 5px 10px;
        font-size: 10pt;
        font-weight: bold;
        font-family: Arial, sans-serif;
        border-radius: 3px 3px 0 0;
        margin-bottom: 0;
    }
    .pdf-section-title .section-en { font-size: 9pt; opacity:0.85; font-weight:normal; }
    
    table.pdf-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 9pt;
        font-family: Arial, sans-serif;
    }
    table.pdf-table tr:nth-child(even) { background: #f0f8ff; }
    table.pdf-table tr:nth-child(odd) { background: #fff; }
    table.pdf-table td {
        padding: 4px 8px;
        border: 1px solid #ccc;
        vertical-align: middle;
    }
    table.pdf-table td.td-en { font-size:9pt; color:#000; font-weight:bold; width:35%; }
    table.pdf-table td.td-hu { font-size:8pt; color:#444; width:35%; }
    table.pdf-table td.td-val { font-size:10pt; font-weight:bold; color:#003d4d; text-align:right; width:15%; }
    table.pdf-table td.td-note { font-size:7.5pt; color:#888; width:15%; font-style:italic; }
    
    .pdf-footer {
        position: fixed;
        bottom: 10mm;
        left: 15mm;
        right: 15mm;
        border-top: 1px solid #ccc;
        padding-top: 5px;
        font-size: 7.5pt;
        color: #999;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: space-between;
    }
    .pdf-sign-box {
        margin-top: 15px;
        display: flex;
        gap: 20px;
    }
    .sign-field {
        flex: 1;
        border-top: 1px solid #000;
        padding-top: 4px;
        font-size: 8pt;
        color: #555;
        text-align: center;
        font-family: Arial, sans-serif;
    }
    .section-2col {
        display: flex;
        gap: 8px;
    }
    .section-2col .pdf-section { flex:1; }
}
</style>
</head>

// ===== SECURITY & VALIDATION =====
const validators = {
    '%': {regex: /^\d{1,3}%?$/, min:0, max:100},
    '°C': {regex: /^\d{1,3}(\.\d)?°?C?$/, min:0, max:120},
    's': {regex: /^\d{1,4}s?$/, min:0, max:9999},
    'm': {regex: /^\d{1,3}m?$/, min:0, max:999},
    'h': {regex: /^\d{1,2}(\.\d)?h?$/, min:0, max:99}
};

function validateVal(oldVal, newVal) {
    const unit = Object.keys(validators).find(u => oldVal.includes(u));
    if (!unit) return newVal.length <= 50 ? newVal : null;
    const v = validators[unit];
    const num = parseFloat(newVal);
    return v.regex.test(newVal) && num >= v.min && num <= v.max ? newVal : null;
}

function sanitizeMenuData(data) {
    if(!data || typeof data !== 'object') return null;
    for(const [k, menu] of Object.entries(data)) {
        if(menu.items) {
            menu.items.forEach(item => {
                for(const field of ['en', 'hu', 'val']) {
                    if(item[field]) item[field] = String(item[field]).replace(/[<>"'&]/g, '');
                }
                if(item.link && !defaultMenuData[item.link]) delete item.link;
            });
        }
    }
    return data;
}

// ===== STATE =====
let history = ["MAIN"];
let selectedPellet = null;
let menuData = sanitizeMenuData(JSON.parse(localStorage.getItem('plum_expert_full_v1'))) || JSON.parse(JSON.stringify(defaultMenuData));
const PROFILES_KEY = 'plum_profiles_v1';
const SERVICE_DATA_KEY = 'plum_service_data_by_pellet_v1';

let serviceDataByPellet = {};

const SERVICE_MENU_KEYS = ['SERVICE_MAIN', 'S_BURNER', 'S_BURN_MOD', 'S_BURN_FIRE', 'S_BURN_OPER', 'S_BURN_OFF', 'S_CLEANING', 'S_SUPERVISION', 'S_GRATE', 'S_BOILER', 'S_CH_HUW', 'S_COUNTERS'];

function initServiceData() {
    try {
        serviceDataByPellet = JSON.parse(localStorage.getItem(SERVICE_DATA_KEY)) || {};
    } catch {
        serviceDataByPellet = {};
    }
    const pelletTypes = ['FA', 'SZALMA', 'MIX'];
    pelletTypes.forEach(pellet => {
        if (!serviceDataByPellet[pellet]) {
            serviceDataByPellet[pellet] = JSON.parse(JSON.stringify(defaultMenuData));
        }
    });
}

function saveServiceData() {
    localStorage.setItem(SERVICE_DATA_KEY, JSON.stringify(serviceDataByPellet));
}

function saveAll() {
    localStorage.setItem('plum_expert_full_v1', JSON.stringify(menuData));
    if (selectedPellet && SERVICE_MENU_KEYS.includes(history[history.length - 1])) {
        SERVICE_MENU_KEYS.forEach(key => {
            serviceDataByPellet[selectedPellet][key] = menuData[key];
        });
        saveServiceData();
    }
}

function resetCurrent() {
    const key = history[history.length - 1];
    if (!defaultMenuData[key]) return;
    if (!confirm(`"${menuData[key].title}" — visszaállítás alapértelmezettre?`)) return;
    menuData[key] = JSON.parse(JSON.stringify(defaultMenuData[key]));
    saveAll();
    renderMenu(key);
}

function resetAll() {
    if (!confirm("MINDEN beállítás visszaáll gyári értékre. Biztos?")) return;
    menuData = JSON.parse(JSON.stringify(defaultMenuData));
    selectedPellet = null;
    history = ["MAIN"];
    saveAll();
    renderMenu("MAIN");
}

function saveProfile(name) {
    if (!name || name.length > 30) { alert("Profil neve 1-30 karakter!"); return; }
    const profiles = JSON.parse(localStorage.getItem(PROFILES_KEY)) || {};
    profiles[name] = { data: JSON.parse(JSON.stringify(menuData)), ts: Date.now() };
    localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
    alert(`Profil mentve: "${name}"`);
}

function loadProfile(name) {
    const profiles = JSON.parse(localStorage.getItem(PROFILES_KEY)) || {};
    if (!profiles[name]) { alert("Profil nem található!"); return; }
    if (!confirm(`"${name}" profil betöltése?`)) return;
    menuData = JSON.parse(JSON.stringify(profiles[name].data));
    saveAll();
    goHome();
}

function deleteProfile(name) {
    if (!confirm(`"${name}" profil törlése?`)) return;
    const profiles = JSON.parse(localStorage.getItem(PROFILES_KEY)) || {};
    delete profiles[name];
    localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
    alert("Profil törölve!");
}

function loadServiceMenuForPellet(pellet){
    selectedPellet = pellet;
    SERVICE_MENU_KEYS.forEach(key => {
        if(serviceDataByPellet[pellet] && serviceDataByPellet[pellet][key]) {
            menuData[key] = JSON.parse(JSON.stringify(serviceDataByPellet[pellet][key]));
        }
    });
    menuData["SERVICE_MAIN"].items = [
        { en:"Burner settings", hu:"Égőfej beállítások", link:"S_BURNER" },
        { en:"Boiler settings", hu:"Kazán beállítások", link:"S_BOILER" },
        { en:"CH and HUW settings", hu:"Fűtés és HMV beállítások", link:"S_CH_HUW" },
        { en:"Show advanced setup", hu:"Haladó beállítások", val:"NEM", editable: true },
        { en:"Service counters", hu:"Szerviz számlálók", link:"S_COUNTERS" },
        { en:"Fuel settings", hu:"Üzemanyag beállítások", link:"S_FUEL_MIX" },
        { en:"Log out", hu:"Kijelentkezés", action:"logout" }
    ];
    renderMenu("SERVICE_MAIN");
}

function renderMenu(key){
    const menu = menuData[key];
    if(!menu) {
        document.getElementById("content").innerHTML = "<div class='menu-item'><span class='hu'>Hamarosan (Bővíthető)...</span></div>";
        return;
    }
    const container = document.getElementById("content");
    const titleEl = document.getElementById("title");
    container.innerHTML = "";

    if(key==="SERVICE_MAIN" && !selectedPellet){
        titleEl.innerText = "Válassz pellet típust";
        [{label:"🌲 FA",key:"FA"},{label:"🌾 SZALMA",key:"SZALMA"},{label:"🔀 MIX (Javasolt)",key:"MIX"}].forEach(p=>{
            const div = document.createElement("div");
            div.className="menu-item";
            div.textContent = p.label;
            div.onclick=()=>{
                selectedPellet=p.key;
                loadServiceMenuForPellet(p.key);
                if(history[history.length-1] !== "SERVICE_MAIN") history.push("SERVICE_MAIN");
            };
            container.appendChild(div);
        });
        return;
    }

    titleEl.innerText = menu.title;

    if(menu.isPassword){
        container.innerHTML = `<div class="login-box"><span class="hu">SZERVIZ KÓD</span><br><input type="password" id="pw" maxlength="4" placeholder="****"><br><br><button class="nav-btn" onclick="checkPw()">BELÉPÉS</button></div>`;
        return;
    }

    (menu.items || []).forEach(item=>{
        const div = document.createElement("div");
        div.className="menu-item";
        div.onclick = ()=>{
            if(item.link){
                history.push(item.link);
                renderMenu(item.link);
            }
            else if(item.action==="logout"){
                if (selectedPellet && SERVICE_MENU_KEYS.includes(key)) {
                    SERVICE_MENU_KEYS.forEach(k => {
                        serviceDataByPellet[selectedPellet][k] = menuData[k];
                    });
                    saveServiceData();
                }
                goHome();
                selectedPellet=null;
            }
            else if(item.action==="toggle"){
                item.val = (item.val==="KI" || item.val==="OFF" || item.val==="NEM") ? "BE":"KI";
                if (selectedPellet && SERVICE_MENU_KEYS.includes(key)) {
                    serviceDataByPellet[selectedPellet][key] = menuData[key];
                    saveServiceData();
                } else {
                    saveAll();
                }
                renderMenu(key);
            }
            else if(item.val !== undefined && item.editable === true) {
                let newVal = prompt(`${item.hu} módosítása:`, item.val);
                if(newVal !== null) {
                    const validated = validateVal(item.val, newVal);
                    if(validated !== null) {
                        item.val = validated;
                        if (selectedPellet && SERVICE_MENU_KEYS.includes(key)) {
                            serviceDataByPellet[selectedPellet][key] = menuData[key];
                            saveServiceData();
                        } else {
                            saveAll();
                        }
                        renderMenu(key);
                    } else {
                        alert("Érvénytelen érték! (Tartomány vagy formátum hiba)");
                    }
                }
            }
        };
        const labelDiv = document.createElement("div");
        labelDiv.className = "labels";
        
        const enSpan = document.createElement("span");
        enSpan.className = "en";
        enSpan.textContent = item.en;
        
        const huSpan = document.createElement("span");
        huSpan.className = "hu";
        huSpan.textContent = item.hu;
        
        labelDiv.appendChild(enSpan);
        labelDiv.appendChild(huSpan);
        div.appendChild(labelDiv);
        
        if(item.val !== undefined && item.val !== null){
            const valSpan = document.createElement("span");
            valSpan.className = "val";
            valSpan.textContent = item.val;
            div.appendChild(valSpan);
        }
        container.appendChild(div);
    });
}

function checkPw(){
    const SERVICE_PASSWORD = "0000";
    if(document.getElementById("pw").value === SERVICE_PASSWORD){
        selectedPellet=null;
        if(history[history.length-1] !== "SERVICE_MAIN") history.push("SERVICE_MAIN");
        renderMenu("SERVICE_MAIN");
    } else {
        alert("Hibás kód!");
        document.getElementById("pw").value = "";
    }
}

function goBack(){
    if(history.length>1){
        const currentKey = history[history.length - 1];
        if (selectedPellet && SERVICE_MENU_KEYS.includes(currentKey)) {
            SERVICE_MENU_KEYS.forEach(key => {
                serviceDataByPellet[selectedPellet][key] = menuData[key];
            });
            saveServiceData();
        }
        history.pop();
        renderMenu(history[history.length-1]);
    }
}

function goHome(){
    const currentKey = history[history.length - 1];
    if (selectedPellet && SERVICE_MENU_KEYS.includes(currentKey)) {
        SERVICE_MENU_KEYS.forEach(key => {
            serviceDataByPellet[selectedPellet][key] = menuData[key];
        });
        saveServiceData();
    }
    history=["MAIN"];
    selectedPellet=null;
    renderMenu("MAIN");
}

function showPdfOptions() {
    const choice = confirm(
        "🖨️ SZERVIZ LAP NYOMTATÁS\n\n" +
        "OK = MIND A 3 TÍPUS egyszerre (FA + SZALMA + MIX)\n" +
        "MÉGSE = Csak az AKTUÁLISAN betöltött típus"
    );
    if (choice) {
        printServiceSheet('ALL');
    } else {
        // Ha nincs betöltve pellet típus
        const pType = selectedPellet || 'MIX';
        printServiceSheet(pType);
    }
}

function getDataForPellet(pelletKey) {
    // Visszaadja az adott pellet típus összes szerviz adatát
    if (serviceDataByPellet[pelletKey]) {
        return serviceDataByPellet[pelletKey];
    }
    return defaultMenuData;
}

function buildSectionTable(data, menuKey) {
    const menu = data[menuKey];
    if (!menu || !menu.items || menu.items.length === 0) return '';
    
    // Csak azok a sorok kerülnek be, amiknek van értékük (val), és nincs link
    const settingItems = menu.items.filter(item => item.val !== undefined && !item.link);
    if (settingItems.length === 0) return '';
    
    let rows = settingItems.map(item => {
        const editableIcon = item.editable ? '✏️' : '';
        return `<tr>
            <td class="td-en">${item.en}</td>
            <td class="td-hu">${item.hu}</td>
            <td class="td-val">${item.val}</td>
            <td class="td-note">${editableIcon}</td>
        </tr>`;
    }).join('');
    
    return `
    <div class="pdf-section">
        <div class="pdf-section-title">
            ${menu.title}
            <span class="section-en"> &nbsp;|&nbsp; ${menuKey}</span>
        </div>
        <table class="pdf-table">
            <thead>
                <tr style="background:#e8f4f8;">
                    <td class="td-en" style="font-weight:bold;color:#003d4d;">Paraméter (EN)</td>
                    <td class="td-hu" style="font-weight:bold;color:#003d4d;">Paraméter (HU)</td>
                    <td class="td-val" style="font-weight:bold;color:#003d4d;text-align:right;">Érték</td>
                    <td class="td-note" style="font-weight:bold;color:#003d4d;">Típus</td>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

        ${buildSectionTable(data, 'S_BURNER')}

    // 2. OLDAL: Üzemi, Kiégetés, Tisztítás, Felügyelet, Kazán, CH/HMV, Számlálók

    <div class="pdf-page">
        <div class="pdf-header">
            <span class="pellet-badge">${pelletKey}</span>
            <h1>Plum ecoMAX 360 — Szerviz Lap (folytatás)</h1>
            <div class="subtitle">Üzemanyag típus: <strong>${pelletName}</strong> &nbsp;|&nbsp; Dátum: ${dateStr}</div>
        </div>
        <div class="pdf-meta">
            <span>📋 Eszköz: Plum ecoMAX 360</span>
            <span>⚙️ Típus: Expert Mix Controller</span>
            <span>📅 Kinyomtatva: ${dateStr}</span>
            <span>📄 Oldal: 2/2</span>

        ${buildSectionTable(data, 'S_BURN_OPER')}
        ${buildSectionTable(data, 'S_BURN_OFF')}
        ${buildSectionTable(data, 'S_CLEANING')}
        ${buildSectionTable(data, 'S_SUPERVISION')}
        ${buildSectionTable(data, 'S_GRATE')}
        ${buildSectionTable(data, 'S_BOILER')}

        ${buildSectionTable(data, 'S_COUNTERS')}
        ${buildSectionTable(data, 'S_FUEL_MIX')}
        
        <div class="pdf-sign-box">
            <div class="sign-field">Szervizes neve / aláírása</div>
            <div class="sign-field">Ügyfél neve / aláírása</div>
            <div class="sign-field">Dátum / Pecsét</div>
        </div>
        
        <div class="pdf-footer">
            <span>Plum ecoMAX 360 — Szerviz Lap | ${pelletName}</span>
            <span>Oldal 2/2 | ${dateStr}</span>

    return page1 + page2;

function printServiceSheet(pelletType) {
    const printArea = document.getElementById('printArea');
    let html = '';
    
    if (pelletType === 'ALL') {
        html += buildPelletPage('FA', 1, 3);
        html += buildPelletPage('SZALMA', 2, 3);
        html += buildPelletPage('MIX', 3, 3);
    } else {
        html += buildPelletPage(pelletType, 1, 1);
    }
    
    printArea.innerHTML = html;
    
    // Kis késleltetés, hogy a DOM frissüljön
    setTimeout(() => {
        window.print();
    }, 200);
}
