<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plum ecoMAX 360 - Expert Mix Full Settings</title>
<style>
/* ===== SCREEN STYLES ===== */
:root {
    --bg: #000c1a; --text-en: #00e5ff; --text-hu: #ffff00;
    --border: #003d4d; --btn-bg: #1a1a1a; --selected-bg: #ffffff;
}
body { font-family: 'Courier New', monospace; background: #222; color: var(--text-en); margin:0; padding:10px; display:flex; flex-direction:column; align-items:center;}
.device { width:95%; max-width:400px; background:#333; padding:15px; border-radius:20px; border:4px solid #555; box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.screen { background: var(--bg); min-height:540px; border:2px solid #000; border-radius:5px; display:flex; flex-direction:column; position:relative; overflow:hidden;}
.header { background: var(--border); color:#fff; padding:12px; text-align:center; font-size:1.1em; font-weight:bold; border-bottom:2px solid #000; text-transform:uppercase;}
.menu-list { flex-grow:1; overflow-y:auto;}
.menu-item { padding:10px 15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
.menu-item:hover { background: var(--selected-bg); color:#000 !important;}
.menu-item:hover span { color:#000 !important;}
.labels { display:flex; flex-direction:column; flex-grow:1;}
.en { font-size:0.95em; font-weight:bold; color:var(--text-en);}
.hu { font-size:0.75em; font-weight:bold; color:var(--text-hu); text-transform:uppercase;}
.val { font-size:1.0em; font-weight:bold; color:#fff; margin-left:10px; text-align:right;}
.nav { display:flex; gap:5px; margin-bottom:10px; width:95%; max-width:400px; flex-wrap:wrap;}
.nav-btn { flex:1; padding:12px; background:var(--btn-bg); color:#fff; border:1px solid #666; border-radius:5px; cursor:pointer; font-weight:bold; font-size:0.85em; min-width:70px;}
.nav-btn:hover { background:#444; }
.nav-btn.pdf-btn { background:#1a4a1a; border-color:#00aa44; color:#00ff66;}
.nav-btn.pdf-btn:hover { background:#2a6a2a; }
.login-box { padding:15px; text-align:center; margin-top:20px; border:1px solid var(--border); border-radius:10px; background: rgba(0,61,77,0.2);}
.login-box input { width:60%; padding:8px; margin:10px 0; background:#000; color:var(--text-hu); border:1px solid var(--text-en); text-align:center; font-size:1.2em;}

/* ===== PRINT AREA REJTÉSE KÉPERNYŐN ===== */
#printArea { 
    position: absolute;
    left: -9999px;
    top: 0;
}

/* ===== PRINT / PDF STYLES ===== */
@media print {
    body, html { 
        background: #fff !important; 
        color: #000 !important; 
        display: block !important; 
        width: 100%;
        height: auto !important;
        margin: 0;
        padding: 0;
    }
    .device, .nav, #content-wrapper { display:none !important; }
    
    #printArea { 
        position: static;
        left: 0;
        display: block !important; 
        width: 100%;
    }
    
    .pdf-page {
        width: 210mm;
        min-height: 296mm; /* Kicsit rövidebb a biztonság kedvéért */
        padding: 15mm;
        margin: 0 auto;
        box-sizing: border-box;
        page-break-after: always; /* Oldaltörés kényszerítése */
        background: #fff;
    }
    
    .pdf-page:last-child { page-break-after: avoid; }
    
    .pdf-header {
        border-bottom: 3px solid #003d4d;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }
    .pdf-header h1 { font-size: 18pt; margin: 0; color: #000; }
    .pdf-header .subtitle { font-size: 10pt; color: #555; }
    .pdf-header .pellet-badge {
        float: right;
        background: #003d4d;
        color: #fff;
        padding: 4px 14px;
        border-radius: 12px;
        font-size: 11pt;
        font-weight: bold;
    }
    
    .pdf-meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 9pt;
        border: 1px solid #ddd;
        padding: 8px;
        background: #f9f9f9;
    }
    
    .pdf-section { margin-bottom: 15px; break-inside: avoid; }
    .pdf-section-title {
        background: #003d4d;
        color: #fff;
        padding: 5px 10px;
        font-size: 10pt;
        font-weight: bold;
    }
    
    table.pdf-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 9pt;
    }
    table.pdf-table td {
        padding: 5px 8px;
        border: 1px solid #ccc;
    }
    .td-en { font-weight: bold; width: 35%; }
    .td-hu { color: #444; width: 35%; }
    .td-val { font-weight: bold; color: #003d4d; text-align: right; width: 15%; }
    
    .pdf-sign-box {
        margin-top: 30px;
        display: flex;
        gap: 30px;
    }
    .sign-field {
        flex: 1;
        border-top: 1px solid #000;
        padding-top: 5px;
        font-size: 8pt;
        text-align: center;
    }

    .pdf-footer {
        position: fixed;
        bottom: 10mm;
        width: 180mm;
        font-size: 8pt;
        color: #999;
        display: flex;
        justify-content: space-between;
        border-top: 1px solid #eee;
    }
}
</style>
</head>

// State management
let history = ["MAIN"];
let selectedPellet = null;
let menuData = JSON.parse(JSON.stringify(defaultMenuData));
let serviceDataByPellet = {};
const SERVICE_MENU_KEYS = ['SERVICE_MAIN', 'S_BURNER', 'S_BURN_MOD', 'S_BURN_FIRE', 'S_BURN_OPER', 'S_BURN_OFF', 'S_CLEANING', 'S_SUPERVISION', 'S_GRATE', 'S_BOILER', 'S_CH_HUW', 'S_COUNTERS'];

function initServiceData() {
    const pelletTypes = ['FA', 'SZALMA', 'MIX'];
    pelletTypes.forEach(p => { serviceDataByPellet[p] = JSON.parse(JSON.stringify(defaultMenuData)); });
}

function renderMenu(key) {
    const menu = menuData[key];
    const container = document.getElementById("content");
    const titleEl = document.getElementById("title");
    container.innerHTML = "";
    if(!menu) return;

    if(key==="SERVICE_MAIN" && !selectedPellet){
        titleEl.innerText = "Válassz pellet típust";
        [{label:"🌲 FA",key:"FA"},{label:"🌾 SZALMA",key:"SZALMA"},{label:"🔀 MIX",key:"MIX"}].forEach(p=>{
            const div = document.createElement("div");
            div.className="menu-item";
            div.textContent = p.label;
            div.onclick=()=>{ selectedPellet=p.key; renderMenu("SERVICE_MAIN"); };
            container.appendChild(div);
        });
        return;
    }

    titleEl.innerText = menu.title;
    if(menu.isPassword){
        container.innerHTML = `<div class="login-box"><span class="hu">SZERVIZ KÓD</span><br><input type="password" id="pw" maxlength="4" placeholder="****"><br><br><button class="nav-btn" onclick="checkPw()">BELÉPÉS</button></div>`;
        return;
    }

    const items = key === "SERVICE_MAIN" ? [
        { en:"Burner settings", hu:"Égőfej beállítások", link:"S_BURNER" },
        { en:"Boiler settings", hu:"Kazán beállítások", link:"S_BOILER" },
        { en:"CH and HUW settings", hu:"Fűtés és HMV beállítások", link:"S_CH_HUW" },
        { en:"Service counters", hu:"Szerviz számlálók", link:"S_COUNTERS" },
        { en:"Log out", hu:"Kijelentkezés", action:"logout" }
    ] : (menu.items || []);

    items.forEach(item => {
        const div = document.createElement("div");
        div.className="menu-item";
        div.onclick = () => {
            if(item.link) { history.push(item.link); renderMenu(item.link); }
            else if(item.action === "logout") { goHome(); }
            else if(item.action === "toggle") { item.val = item.val === "KI" ? "BE" : "KI"; renderMenu(key); }
        };
        div.innerHTML = `<div class="labels"><span class="en">${item.en}</span><span class="hu">${item.hu}</span></div>`;
        if(item.val) div.innerHTML += `<span class="val">${item.val}</span>`;
        container.appendChild(div);
    });
}

function checkPw() {
    if(document.getElementById("pw").value === "0000") { history.push("SERVICE_MAIN"); renderMenu("SERVICE_MAIN"); }
    else alert("Hibás kód!");
}

function goBack() { if(history.length > 1) { history.pop(); renderMenu(history[history.length-1]); } }
function goHome() { history = ["MAIN"]; selectedPellet = null; renderMenu("MAIN"); }
function resetCurrent() { const k = history[history.length-1]; menuData[k] = JSON.parse(JSON.stringify(defaultMenuData[k])); renderMenu(k); }
function resetAll() { menuData = JSON.parse(JSON.stringify(defaultMenuData)); goHome(); }

// ===== NYOMTATÁSI MOTOR =====

function showPdfOptions() {
    const choice = confirm("OK = MIND A 3 TÍPUS (FA+SZALMA+MIX)\nMÉGSE = Csak az AKTUÁLIS típus");
    printServiceSheet(choice ? 'ALL' : (selectedPellet || 'MIX'));
}

function buildSectionTable(data, menuKey) {
    const menu = data[menuKey];
    if (!menu || !menu.items) return '';
    const items = menu.items.filter(i => i.val !== undefined && !i.link);
    if (items.length === 0) return '';
    
    let rows = items.map(i => `<tr><td class="td-en">${i.en}</td><td class="td-hu">${i.hu}</td><td class="td-val">${i.val}</td></tr>`).join('');
    return `<div class="pdf-section"><div class="pdf-section-title">${menu.title}</div><table class="pdf-table">${rows}</table></div>`;
}

function buildPelletPage(pKey) {
    const data = serviceDataByPellet[pKey] || defaultMenuData;
    const dateStr = new Date().toLocaleString('hu-HU');
    const sections = ['S_BURNER', 'S_BURN_MOD', 'S_BURN_FIRE', 'S_BURN_OPER', 'S_BURN_OFF', 'S_CLEANING', 'S_BOILER', 'S_CH_HUW', 'S_FUEL_MIX'];
    
    // 1. OLDAL
    let html = `<div class="pdf-page">
        <div class="pdf-header"><span class="pellet-badge">${pKey}</span><h1>ecoMAX 360 Szerviz Lap</h1><div class="subtitle">Típus: ${pKey} | Dátum: ${dateStr}</div></div>
        <div class="pdf-meta"><span>📋 Plum ecoMAX 360</span><span>⚙️ Expert Mix</span><span>📄 Oldal: 1/2</span></div>
        ${sections.slice(0,4).map(s => buildSectionTable(data, s)).join('')}
        <div class="pdf-footer"><span>${pKey} szervizlap</span><span>${dateStr}</span></div>
    </div>`;

    // 2. OLDAL
    html += `<div class="pdf-page">
        <div class="pdf-header"><span class="pellet-badge">${pKey}</span><h1>Szerviz Lap (Folytatás)</h1></div>
        ${sections.slice(4).map(s => buildSectionTable(data, s)).join('')}
        <div class="pdf-sign-box"><div class="sign-field">Szer
